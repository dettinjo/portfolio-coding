# Single production compose for the portfolio app.
#
# The image is built by GitHub Actions and pushed to ghcr.io — never built on the
# server. Deployed via Coolify (set Coolify's "Docker Compose Location" to this
# file). Runtime secrets are injected by Coolify, not baked into the image.
#
# Projects/skills/resume are fetched from GitHub at *build time* only; to update
# the live site, rebuild (push to main, or run the "Build & Deploy" workflow).
#
# Analytics (Umami) is optional and expected to run as a separate service; leave
# the UMAMI_* vars empty to disable it.
services:
  app:
    image: ghcr.io/dettinjo/portfolio-coding:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/en"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - UMAMI_INTERNAL_URL=${UMAMI_INTERNAL_URL}
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID}
    # Lets the container reach a separately-hosted Umami at host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify

networks:
  coolify:
    external: true
