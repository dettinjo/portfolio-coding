# Umami — self-hosted, privacy-friendly analytics
#
# Deploy as a separate service in Coolify → New Resource → Docker Compose.
# Do NOT assign a public domain — Umami is internal-only.
#
# Required env vars to set in Coolify:
#   DATABASE_URL   Full PostgreSQL connection string (see note on % encoding below)
#   POSTGRES_DB    Database name          (e.g. umami)
#   POSTGRES_USER  Database user          (e.g. umami)
#   POSTGRES_PASSWORD  Database password  (must match DATABASE_URL)
#   UMAMI_APP_SECRET   Random secret string (e.g. openssl rand -hex 32)
#
# ⚠ PASSWORD ENCODING: If your password contains %, !, @, or # you MUST
#   URL-encode them in DATABASE_URL (but NOT in POSTGRES_PASSWORD):
#     %  →  %25       !  →  %21       @  →  %40       #  →  %23
#   Example: password "abc%35xyz" → DATABASE_URL password field: "abc%2535xyz"
#   Recommended: use a password with only letters, digits, and - _ . ~
#
# Tailscale admin access (run once on the server after first deploy):
#   tailscale serve --bg http://localhost:3002
#   → dashboard at https://<hostname>.<tailnet>.ts.net  (Tailscale devices only)
#
# Portfolio wiring (set on portfolio app in Coolify):
#   UMAMI_INTERNAL_URL=http://host.docker.internal:3002
#   UMAMI_WEBSITE_ID=<copy from Umami → Settings → Websites after first login>
#
# Default credentials on first boot:  user: admin  password: umami
# Change the password immediately after first login.

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    # Bind only to localhost — not reachable from the public internet.
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      # Provide the full DATABASE_URL directly so special characters in
      # passwords are handled by you, not interpolated by docker-compose.
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:?UMAMI_APP_SECRET is required}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - coolify

  umami-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-umami}
      POSTGRES_USER: ${POSTGRES_USER:-umami}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-umami} -d ${POSTGRES_DB:-umami}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - coolify

volumes:
  umami-db-data:

networks:
  coolify:
    external: true
