name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          # GitHub Actions cache keeps builds fast without any server-side disk use
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_FULL_NAME=${{ secrets.NEXT_PUBLIC_FULL_NAME }}
            NEXT_PUBLIC_EMAIL_ADDRESS=${{ secrets.NEXT_PUBLIC_EMAIL_ADDRESS }}
            NEXT_PUBLIC_PHONE_NUMBER=${{ secrets.NEXT_PUBLIC_PHONE_NUMBER }}
            NEXT_PUBLIC_STREET_ADDRESS=${{ secrets.NEXT_PUBLIC_STREET_ADDRESS }}
            NEXT_PUBLIC_CITY_ADDRESS=${{ secrets.NEXT_PUBLIC_CITY_ADDRESS }}
            NEXT_PUBLIC_GITHUB_USERNAME=${{ secrets.NEXT_PUBLIC_GITHUB_USERNAME }}
            NEXT_PUBLIC_LINKEDIN_USERNAME=${{ secrets.NEXT_PUBLIC_LINKEDIN_USERNAME }}
            NEXT_PUBLIC_INSTAGRAM_USERNAME=${{ secrets.NEXT_PUBLIC_INSTAGRAM_USERNAME }}
            NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}

      # PAYLOAD_SECRET and POSTGRES_URL are injected at runtime by Coolify —
      # they must never appear as build args (would be stored in image layers).

      - name: Trigger Coolify deploy
        run: |
          curl --fail -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}"
