name: Build & Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    # Triggered by project repos and the config repo when their data changes.
    # Payload: { "repo": "dettinjo/kube-url-shortener" } (for logging)
    types: [portfolio-data-changed]
  schedule:
    # Fallback safety net — the portfolio-watcher poller handles real-time triggers;
    # this catches any edge cases (watcher down, missed events, new repos without a push).
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute cache-bust value
        id: cachebust
        # On repository_dispatch and schedule triggers the portfolio data may have
        # changed in external repos — bust the npm build cache so fetch-portfolio.ts
        # always re-runs. On push triggers the code changed so the layer rebuilds
        # naturally; pass a fixed value to keep the cache warm for subsequent runs.
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
            echo "value=$(date +%s)" >> $GITHUB_OUTPUT
          else
            echo "value=1" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          # GitHub Actions cache — builds stay fast without touching the server
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # PORTFOLIO_GITHUB_TOKEN is a PAT with repo scope — passed as a
          # BuildKit secret so it's available to fetch-portfolio.ts during
          # `npm run build` without being baked into any image layer.
          # Without it the script falls back to the public GitHub API (public
          # repos only, rate-limited to 60 req/hr).
          secrets: |
            GITHUB_TOKEN=${{ secrets.PORTFOLIO_GITHUB_TOKEN }}
          build-args: |
            CACHEBUST=${{ steps.cachebust.outputs.value }}
            NEXT_PUBLIC_FULL_NAME=${{ secrets.NEXT_PUBLIC_FULL_NAME || 'Joel Dettinger' }}
            NEXT_PUBLIC_EMAIL_ADDRESS=${{ secrets.NEXT_PUBLIC_EMAIL_ADDRESS || '' }}
            NEXT_PUBLIC_PHONE_NUMBER=${{ secrets.NEXT_PUBLIC_PHONE_NUMBER || '' }}
            NEXT_PUBLIC_STREET_ADDRESS=${{ secrets.NEXT_PUBLIC_STREET_ADDRESS || '' }}
            NEXT_PUBLIC_CITY_ADDRESS=${{ secrets.NEXT_PUBLIC_CITY_ADDRESS || '' }}
            NEXT_PUBLIC_GITHUB_USERNAME=${{ secrets.NEXT_PUBLIC_GITHUB_USERNAME || 'dettinjo' }}
            NEXT_PUBLIC_LINKEDIN_USERNAME=${{ secrets.NEXT_PUBLIC_LINKEDIN_USERNAME || 'joeldettinger' }}
            NEXT_PUBLIC_INSTAGRAM_USERNAME=${{ secrets.NEXT_PUBLIC_INSTAGRAM_USERNAME || 'joeldettinger' }}
            NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL || 'https://codeby.joeldettinger.de' }}

      # Runtime secrets (SMTP_PASS, UMAMI_WEBSITE_ID, etc.) are injected at
      # container startup via Coolify — they must never appear as build args.

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          envs: COOLIFY_TOKEN
          script: |
            # Pull the new image (built by GitHub Actions, never built on server)
            docker pull ghcr.io/dettinjo/portfolio-coding:latest
            # Trigger Coolify to redeploy (Coolify will pull latest compose, see the new image, and recreate container)
            curl -s -X GET \
              "http://localhost:8000/api/v1/deploy?uuid=ikws0k0oc440k0cs08csws08&force=false" \
              -H "Authorization: Bearer $COOLIFY_TOKEN"
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
