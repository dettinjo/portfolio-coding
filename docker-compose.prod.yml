services:
  app:
    # Image is built by GitHub Actions and pushed to ghcr.io — never built on the server.
    image: ghcr.io/dettinjo/portfolio-coding:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/en"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - UMAMI_INTERNAL_URL=${UMAMI_INTERNAL_URL}
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID}
    # Allows the container to reach host.docker.internal:3001 (Umami)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify

  portfolio-watcher:
    # Polls GitHub every 5 min for new commits to portfolio-tagged repos.
    # Fires repository_dispatch on portfolio-coding when changes are detected,
    # triggering a full rebuild. Zero per-repo setup required.
    build:
      context: ./portfolio-watcher
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Target portfolio repo is derived from the token's user by default.
      # Override with PORTFOLIO_REPO=owner/portfolio-coding if needed.
      - POLL_INTERVAL=300
    volumes:
      - portfolio-watcher-state:/data
    networks:
      - coolify

volumes:
  portfolio-watcher-state:

networks:
  coolify:
    external: true
