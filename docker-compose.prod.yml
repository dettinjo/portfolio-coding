services:
  app:
    # Image is built by GitHub Actions and pushed to ghcr.io — never built on the server.
    image: ghcr.io/dettinjo/portfolio-coding:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/en"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PORTFOLIO_CONFIG_REPO=${PORTFOLIO_CONFIG_REPO}
      - UMAMI_INTERNAL_URL=${UMAMI_INTERNAL_URL}
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID}
    # Allows the container to reach host.docker.internal:3001 (Umami)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify

networks:
  coolify:
    external: true
